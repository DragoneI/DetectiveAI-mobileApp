name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Init TWA (auto yes)
        run: |
          yes | bubblewrap init \
          --manifest https://detective-ai-mobile-app.vercel.app/manifest.json \
          --skipPwaValidation \
          --packageId com.detectiveai.app \
          --host detective-ai-mobile-app.vercel.app \
          --name "AI Detective" \
          --launcherName "DetectiveAI"

      - name: Build APK
        run: |
          cd twa*
          yes | bubblewrap build

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: twa*/app/build/outputs/apk/release/*.apk
