name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 11
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '11'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone TWA template
        run: |
          git clone https://github.com/GoogleChromeLabs/svgomg-twa.git twa-app

      - name: Configure TWA app
        run: |
          cd twa-app
          sed -i 's|https://svgomg.firebaseapp.com|https://detective-ai-mobile-app.vercel.app|g' app/build.gradle
          sed -i 's|com.chromeos.svgomg|com.detectiveai.app|g' app/build.gradle
          sed -i 's|svgomg.firebaseapp.com|detective-ai-mobile-app.vercel.app|g' app/build.gradle
          sed -i 's|applicationId "com.chromeos.svgomg"|applicationId "com.detectiveai.app"|g' app/build.gradle

      - name: Build APK
        run: |
          cd twa-app
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: twa-app/app/build/outputs/apk/release/*.apk
