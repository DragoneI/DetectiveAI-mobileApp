name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Install ImageMagick
        run: sudo apt-get install -y imagemagick

      - name: Create TWA project from scratch
        run: |
          mkdir -p twa-app/app/src/main/java/com/detectiveai/app
          mkdir -p twa-app/app/src/main/res/values
          mkdir -p twa-app/app/src/main/res/mipmap-mdpi
          mkdir -p twa-app/app/src/main/res/mipmap-hdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xhdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xxhdpi
          mkdir -p twa-app/app/src/main/res/mipmap-xxxhdpi
          mkdir -p twa-app/app/src/main/res/mipmap-anydpi-v26
          mkdir -p twa-app/gradle/wrapper

          cat > twa-app/settings.gradle << 'EOF'
          include ':app'
          EOF

          cat > twa-app/build.gradle << 'EOF'
          buildscript {
              repositories {
                  google()
                  mavenCentral()
              }
              dependencies {
                  classpath 'com.android.tools.build:gradle:8.1.0'
              }
          }
          allprojects {
              repositories {
                  google()
                  mavenCentral()
              }
          }
          EOF

          cat > twa-app/gradle.properties << 'EOF'
          android.useAndroidX=true
          android.enableJetifier=true
          EOF

          cat > twa-app/gradle/wrapper/gradle-wrapper.properties << 'EOF'
          distributionBase=GRADLE_USER_HOME
          distributionPath=wrapper/dists
          distributionUrl=https\://services.gradle.org/distributions/gradle-8.2-bin.zip
          zipStoreBase=GRADLE_USER_HOME
          zipStorePath=wrapper/dists
          EOF

          cat > twa-app/app/build.gradle << 'EOF'
          plugins {
              id 'com.android.application'
          }
          android {
              compileSdk 34
              namespace 'com.detectiveai.app'
              defaultConfig {
                  applicationId "com.detectiveai.app"
                  minSdk 19
                  targetSdk 34
                  versionCode 1
                  versionName "1.0"
              }
              signingConfigs {
                  release {
                      keyAlias System.getenv("KEY_ALIAS")
                      keyPassword System.getenv("KEY_PASSWORD")
                      storeFile file("keystore.jks")
                      storePassword System.getenv("STORE_PASSWORD")
                  }
              }
              buildTypes {
                  release {
                      minifyEnabled false
                      signingConfig signingConfigs.release
                  }
              }
          }
          dependencies {
              implementation 'com.google.androidbrowserhelper:androidbrowserhelper:2.5.0'
          }
          EOF

          cat > twa-app/app/src/main/AndroidManifest.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <manifest xmlns:android="http://schemas.android.com/apk/res/android">
              <application
                  android:label="AI Detective"
                  android:icon="@mipmap/ic_launcher"
                  android:roundIcon="@mipmap/ic_launcher"
                  android:theme="@android:style/Theme.Black.NoTitleBar">
                  <activity
                      android:name="com.google.androidbrowserhelper.trusted.LauncherActivity"
                      android:exported="true">
                      <meta-data
                          android:name="android.support.customtabs.trusted.DEFAULT_URL"
                          android:value="https://detective-ai-mobile-app.vercel.app" />
                      <intent-filter>
                          <action android:name="android.intent.action.MAIN" />
                          <category android:name="android.intent.category.LAUNCHER" />
                      </intent-filter>
                      <intent-filter android:autoVerify="true">
                          <action android:name="android.intent.action.VIEW"/>
                          <category android:name="android.intent.category.DEFAULT" />
                          <category android:name="android.intent.category.BROWSABLE"/>
                          <data android:scheme="https"
                              android:host="detective-ai-mobile-app.vercel.app"/>
                      </intent-filter>
                  </activity>
              </application>
          </manifest>
          EOF

          cat > twa-app/app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">AI Detective</string>
          </resources>
          EOF

          cat > twa-app/app/src/main/res/values/colors.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <color name="ic_launcher_background">#000000</color>
          </resources>
          EOF

          cat > twa-app/app/src/main/res/mipmap-anydpi-v26/ic_launcher.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <adaptive-icon xmlns:android="http://schemas.android.com/apk/res/android">
              <background android:drawable="@color/ic_launcher_background"/>
              <foreground android:drawable="@mipmap/ic_launcher_foreground"/>
          </adaptive-icon>
          EOF

          # Icônes avec padding pour éviter la coupure
          convert logo-512.png -resize 380x380 -gravity center -extent 512x512 -background black twa-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher.png
          convert logo-512.png -resize 380x380 -gravity center -extent 512x512 -background black twa-app/app/src/main/res/mipmap-xxxhdpi/ic_launcher_foreground.png
          convert logo-192.png -resize 144x144 -gravity center -extent 192x192 -background black twa-app/app/src/main/res/mipmap-xxhdpi/ic_launcher.png
          convert logo-192.png -resize 108x108 -gravity center -extent 144x144 -background black twa-app/app/src/main/res/mipmap-xhdpi/ic_launcher.png
          convert logo-192.png -resize 72x72 -gravity center -extent 96x96 -background black twa-app/app/src/main/res/mipmap-hdpi/ic_launcher.png
          convert logo-192.png -resize 48x48 -gravity center -extent 64x64 -background black twa-app/app/src/main/res/mipmap-mdpi/ic_launcher.png

          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradlew -o twa-app/gradlew
          chmod +x twa-app/gradlew
          curl -sL https://raw.githubusercontent.com/gradle/gradle/v8.2.0/gradle/wrapper/gradle-wrapper.jar -o twa-app/gradle/wrapper/gradle-wrapper.jar

      - name: Generate Keystore
        run: |
          keytool -genkeypair \
            -alias ${{ secrets.KEY_ALIAS }} \
            -keypass ${{ secrets.KEY_PASSWORD }} \
            -keystore twa-app/app/keystore.jks \
            -storepass ${{ secrets.STORE_PASSWORD }} \
            -dname "CN=AI Detective, OU=App, O=DetectiveAI, L=Casablanca, S=MA, C=MA" \
            -keyalg RSA \
            -keysize 2048 \
            -validity 10000

      - name: Build APK
        env:
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
          STORE_PASSWORD: ${{ secrets.STORE_PASSWORD }}
        run: |
          cd twa-app
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release-signed
          path: twa-app/app/build/outputs/apk/release/*.apk
