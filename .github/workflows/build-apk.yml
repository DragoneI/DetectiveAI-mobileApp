name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Setup Android SDK
        uses: android-actions/setup-android@v3

      - name: Clone modern TWA template
        run: |
          git clone https://github.com/chromeos/pwa-to-twa.git twa-app

      - name: Configure TWA app
        run: |
          cd twa-app
          cat > app/src/main/res/values/strings.xml << 'EOF'
          <?xml version="1.0" encoding="utf-8"?>
          <resources>
              <string name="app_name">AI Detective</string>
          </resources>
          EOF

          sed -i 's|applicationId.*|applicationId "com.detectiveai.app"|g' app/build.gradle
          sed -i 's|https://airhorner.com|https://detective-ai-mobile-app.vercel.app|g' app/src/main/AndroidManifest.xml
          sed -i 's|airhorner.com|detective-ai-mobile-app.vercel.app|g' app/src/main/AndroidManifest.xml
          sed -i 's|airhorner.com|detective-ai-mobile-app.vercel.app|g' app/src/main/res/values/twa_strings.xml

      - name: Build APK
        run: |
          cd twa-app
          chmod +x gradlew
          ./gradlew assembleRelease --no-daemon

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: twa-app/app/build/outputs/apk/release/*.apk
