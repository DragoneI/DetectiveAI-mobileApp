name: Build Android APK

on:
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repo
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Setup Java 17
        uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: '17'

      - name: Install Bubblewrap
        run: npm install -g @bubblewrap/cli

      - name: Configure Bubblewrap (skip JDK prompt)
        run: |
          mkdir -p ~/.bubblewrap
          cat > ~/.bubblewrap/config.json << 'EOF'
          {
            "jdkPath": "$JAVA_HOME",
            "androidSdkPath": "$ANDROID_SDK_ROOT"
          }
          EOF

      - name: Init TWA
        run: |
          bubblewrap init \
            --manifest https://detective-ai-mobile-app.vercel.app/manifest.json \
            --skipPwaValidation \
            --packageId com.detectiveai.app \
            --host detective-ai-mobile-app.vercel.app \
            --name "AI Detective" \
            --launcherName "DetectiveAI" \
            --jdkPath "$JAVA_HOME" \
            --androidSdkPath "$ANDROID_SDK_ROOT"

      - name: Build APK
        run: |
          cd twa-app
          bubblewrap build --skipPwaValidation

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: app-release
          path: "**/app/build/outputs/apk/release/*.apk"
